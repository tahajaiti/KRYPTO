<div class="grid gap-4 md:grid-cols-2 krypto-slide-up">
  
  <!-- primary: net worth -->
  <article class="krypto-card relative overflow-hidden p-6 border-emerald-400/30 bg-gradient-to-br from-emerald-950/20 to-transparent">
    <div class="relative z-10 flex items-center justify-between">
      <div>
        <p class="text-[10px] uppercase tracking-widest text-emerald-400/60 font-bold mb-1">Total Net Worth</p>
        <h3 class="text-3xl font-black text-emerald-50 tracking-tight">
          {{ netWorth()?.totalNetWorthInKryp ?? 0 | number: '1.2-4' }}
          <span class="text-xs font-normal text-emerald-400/40 ml-1">KRYP</span>
        </h3>
        <div class="mt-4 flex items-center gap-2">
          <span class="inline-flex items-center gap-1 rounded-full bg-emerald-400/10 px-2 py-0.5 text-[10px] font-bold text-emerald-400">
            <ng-icon name="heroChartBar"></ng-icon>
            {{ wallet()?.balances?.length ?? 0 }} Assets
          </span>
          <span class="text-[10px] text-emerald-100/30">Total value across all holdings</span>
        </div>
      </div>
      <div class="hidden sm:grid h-16 w-16 place-items-center rounded-2xl bg-emerald-400/10 text-emerald-400">
        <ng-icon name="heroChartBar" class="text-3xl"></ng-icon>
      </div>
    </div>
    <!-- decorative background element -->
    <div class="absolute -right-4 -bottom-4 h-32 w-32 rounded-full bg-emerald-400/5 blur-3xl"></div>
  </article>

  <!-- secondary: kryp balance & wallet info -->
  <article class="krypto-card p-6 border-cyan-400/20 bg-gradient-to-br from-cyan-950/10 to-transparent">
    <div class="flex flex-col h-full justify-between gap-6">
      <div class="flex items-center justify-between">
        <div>
          <p class="text-[10px] uppercase tracking-widest text-cyan-400/60 font-bold mb-1">KRYP Balance</p>
          <p class="text-2xl font-bold text-emerald-50">
            {{ krypBalance() | number: '1.2-2' }}
            <span class="text-xs font-normal text-cyan-400/40 ml-1">KRYP</span>
          </p>
        </div>
        <div class="h-10 w-10 grid place-items-center rounded-xl bg-cyan-400/10 text-cyan-400">
          <ng-icon name="heroWallet" class="text-xl"></ng-icon>
        </div>
      </div>

      <div class="flex items-center justify-between pt-4 border-t border-emerald-100/5">
        <div class="min-w-0">
          <p class="text-[9px] uppercase tracking-wider text-emerald-100/30 font-medium">Wallet Address</p>
          <p class="truncate font-mono text-xs text-emerald-100/60">{{ wallet()?.id }}</p>
        </div>
        <button 
          (click)="copyWalletId()"
          class="ml-3 flex h-8 w-8 items-center justify-center rounded-lg border border-emerald-100/10 bg-emerald-100/5 text-emerald-300 transition-all hover:bg-emerald-400/20 hover:text-emerald-50 active:scale-95"
          [title]="copied() ? 'Copied!' : 'Copy Wallet ID'"
        >
          <ng-icon [name]="copied() ? 'heroClipboard' : 'heroClipboard'" [class.text-emerald-400]="copied()"></ng-icon>
        </button>
      </div>
    </div>
  </article>

</div>
