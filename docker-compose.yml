services:

  # --- infrastructure ---

  postgres:
    image: postgres:17-alpine
    container_name: krypto-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - krypto-network

  redis:
    image: redis:7-alpine
    container_name: krypto-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - krypto-network

  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: krypto-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - krypto-network

  # --- platform services ---

  discovery-service:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
      args:
        SERVICE_NAME: discovery-service
    container_name: krypto-discovery
    ports:
      - "8761:8761"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8761/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - krypto-network

  config-service:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
      args:
        SERVICE_NAME: config-service
    container_name: krypto-config
    ports:
      - "8888:8888"
    environment:
      SPRING_PROFILES_ACTIVE: native,docker
    volumes:
      - ./config-repo:/config-repo:ro
    depends_on:
      discovery-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8888/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - krypto-network

  api-gateway:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
      args:
        SERVICE_NAME: api-gateway
    container_name: krypto-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
    depends_on:
      config-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - krypto-network

  # --- business services ---

  user-service:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
      args:
        SERVICE_NAME: user-service
    container_name: krypto-user
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    depends_on:
      config-service:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - krypto-network

  wallet-service:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
      args:
        SERVICE_NAME: wallet-service
    container_name: krypto-wallet
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    depends_on:
      config-service:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - krypto-network

  coin-service:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
      args:
        SERVICE_NAME: coin-service
    container_name: krypto-coin
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    depends_on:
      config-service:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - krypto-network

  trading-service:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
      args:
        SERVICE_NAME: trading-service
    container_name: krypto-trading
    ports:
      - "8084:8084"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    depends_on:
      config-service:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - krypto-network

  blockchain-service:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
      args:
        SERVICE_NAME: blockchain-service
    container_name: krypto-blockchain
    ports:
      - "8085:8085"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    depends_on:
      config-service:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - krypto-network

  gamification-service:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
      args:
        SERVICE_NAME: gamification-service
    container_name: krypto-gamification
    ports:
      - "8086:8086"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    depends_on:
      config-service:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - krypto-network

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:

networks:
  krypto-network:
    driver: bridge
