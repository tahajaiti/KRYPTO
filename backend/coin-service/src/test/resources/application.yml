spring:
  cloud:
    config:
      enabled: false
  cache:
    type: simple
  task:
    scheduling:
      enabled: false
  datasource:
    url: jdbc:h2:mem:coindb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

eureka:
  client:
    enabled: false

jwt:
  secret: ${JWT_SECRET:ZTQ1MjdhNjgtMmYwZC00YTcxLTk3NTAtOGYxZjAyNjRkOTFhCg==}
  access-token-expiration: 900000

coin:
  creation-fee: 100

market-simulation:
  enabled: false
