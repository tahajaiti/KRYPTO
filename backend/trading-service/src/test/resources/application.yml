spring:
  cloud:
    config:
      enabled: false
  cache:
    type: simple
  datasource:
    url: jdbc:h2:mem:tradingdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  rabbitmq:
    listener:
      simple:
        auto-startup: false
      direct:
        auto-startup: false

eureka:
  client:
    enabled: false

jwt:
  secret: ${JWT_SECRET:ZTQ1MjdhNjgtMmYwZC00YTcxLTk3NTAtOGYxZjAyNjRkOTFhCg==}
  access-token-expiration: 900000

trading:
  fee-rate: 0.01

krypto:
  internal-secret: krypto-internal-secret
