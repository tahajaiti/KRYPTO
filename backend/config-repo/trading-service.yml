server:
  port: 8084

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/krypto_trading
    username: ${POSTGRES_USER:krypto}
    password: ${POSTGRES_PASSWORD:krypto}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  cache:
    type: redis
    redis:
      time-to-live: 60s

jwt:
  secret: ${JWT_SECRET:ZTQ1MjdhNjgtMmYwZC00YTcxLTk3NTAtOGYxZjAyNjRkOTFhCg==}
  access-token-expiration: 900000

trading:
  fee-rate: 0.01

krypto:
  internal-secret: ${INTERNAL_SECRET:krypto-internal-secret}

management:
  endpoints:
    web:
      exposure:
        include: health,info
