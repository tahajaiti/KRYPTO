server:
  port: 8085

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/krypto_blockchain
    username: ${POSTGRES_USER:krypto}
    password: ${POSTGRES_PASSWORD:krypto}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  rabbitmq:
    listener:
      simple:
        default-requeue-rejected: false
        retry:
          enabled: true
          initial-interval: 1000
          multiplier: 2.0
          max-attempts: 3
          max-interval: 5000

jwt:
  secret: ${JWT_SECRET:ZTQ1MjdhNjgtMmYwZC00YTcxLTk3NTAtOGYxZjAyNjRkOTFhCg==}
  access-token-expiration: 900000

blockchain:
  difficulty: 3
  max-transactions-per-block: 5

management:
  endpoints:
    web:
      exposure:
        include: health,info
