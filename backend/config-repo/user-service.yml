server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/krypto_users
    username: ${POSTGRES_USER:krypto}
    password: ${POSTGRES_PASSWORD:krypto}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: ${JWT_SECRET:ZTQ1MjdhNjgtMmYwZC00YTcxLTk3NTAtOGYxZjAyNjRkOTFhCg==}
  access-token-expiration: 900000
  refresh-token-expiration: 604800000

krypto:
  initial-balance: 500
